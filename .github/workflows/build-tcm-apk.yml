name: Build TCM Talk APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Grant Gradle wrapper permissions
        run: chmod +x gradlew
      - name: Configure Gradle memory + reinforce properties
        run: |
          echo "org.gradle.jvmargs=-Xmx6g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
      - name: Build generic debug APK
        run: ./gradlew assembleQaDebug --stacktrace -PNC_TEST_SERVER_BASEURL=http://server -PNC_TEST_SERVER_USERNAME=test -PNC_TEST_SERVER_PASSWORD=test
      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/qa/debug/*.apk out/tcm-talk-debug.apk
          ls -la out/
      - uses: actions/upload-artifact@v4
        with:
          name: tcm-talk-debug-apk
          path: out/tcm-talk-debug.apk
          retention-days: 30
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: debug-${{ github.run_number }}
          name: TCM Talk debug build ${{ github.run_number }}
          files: out/tcm-talk-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
